name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          # Build needs a DB URL present but won't connect during static analysis.
          # Set real values via Railway env; these are safe placeholders for CI.
          DATABASE_URL: "postgres://ci:ci@localhost:5432/ci"
          NEXTAUTH_SECRET: "ci-placeholder-secret-not-used-for-auth"
          NEXTAUTH_URL: "http://localhost:3000"
          STOCKFISH_BACKEND_URL: "http://localhost:8080"
